<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hamburgueria Rosa</title>
  <style>
    :root{
  --bg: #fff0f7;
  --card: #ffffff;
  --pink-1: #ff6fb3;
  --pink-2: #ff2f8a;
  --accent: #ff8fc1;
  --text: #3a1338;
}

*{box-sizing:border-box}
html,body{
  height:100%;
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,var(--bg),#ffeef8);
  color:var(--text);
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
}

.logo{width:220px}

.nav button{
  background:none;
  border:2px solid var(--pink-1);
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:0 16px;
}

.hero{
  display:flex;
  gap:24px;
  align-items:center;
}

.hero-left{flex:1}
.hero-right{flex:1; display:flex; justify-content:center}

.hero h1{font-size:2rem; margin:0 0 8px}
.hero p{margin:0 0 16px; color:#6b4a63}

.accent{color:var(--pink-2)}

.cta{
  display:inline-block;
  padding:12px 18px;
  background:var(--pink-1);
  color:white;
  border-radius:14px;
  text-decoration:none;
  font-weight:700;
}

.img-frame{
  position:relative;
  width:280px;
  height:220px;
  border-radius:18px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffe6f3;
}

.img-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.img-placeholder{
  position:absolute;
  font-size:48px;
  opacity:0.5;
}

.gallery{margin-top:36px}
.gallery h2{margin-bottom:12px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

figure{
  background:var(--card);
  padding:8px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.grid img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.about{
  margin-top:28px;
  padding:18px;
  background:#ffe3f1;
  border-radius:12px;
}

.footer{
  text-align:center;
  padding:18px;
  margin-top:26px;
  color:#6b4a63;
}

/* Responsivo */
@media(max-width:800px){
  .hero{flex-direction:column}
  .logo{width:180px}
}

  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo-wrap">
      <!-- Logo em SVG -->
      <svg class="logo" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" aria-label="Logo Hamburgueria Rosa">
        <defs>
          <linearGradient id="bunGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#ffd0e8" />
            <stop offset="100%" stop-color="#ff8fc1" />
          </linearGradient>
        </defs>
        <ellipse cx="40" cy="22" rx="34" ry="18" fill="url(#bunGrad)" stroke="#ff6fae" stroke-width="2"/>
        <rect x="6" y="32" width="68" height="12" rx="6" fill="#8b3a3a" />
        <path d="M8 44 q8 -6 18 -2 q12 6 28 -2 q14 -7 38 4" fill="#9fe39f" opacity="0.95" />
        <ellipse cx="40" cy="58" rx="34" ry="10" fill="url(#bunGrad)" stroke="#ff6fae" stroke-width="1.6"/>
        <text x="100" y="44" font-family="Arial" font-size="18" font-weight="700" fill="#ff2f8a">Hamburgueria</text>
        <text x="100" y="62" font-family="Arial" font-size="12" font-weight="600" fill="#ff6fb3">Rosa & Co.</text>
      </svg>
    </div>

    <nav class="nav">
      <button id="themeBtn">✨ Tema</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-left">
        <h1>O sabor mais <span class="accent">rosa</span> da cidade</h1>
        <p>Hambúrgueres artesanais com identidade visual marcante.</p>
        <a class="cta" href="http://127.0.0.1:5500/ola2.html">cardápio</a>
      </div>

      <div class="hero-right">
        <div class="img-frame">
          <img src="https://genialmaker.com.br/wp-content/uploads/2023/06/logo-hamburgueria.png" alt="Hambúrguer rosa" onerror="this.style.display='none'">
          <div class="img-placeholder"></div>
        </div>
      </div>
    </section>

    <section id="galeria" class="gallery">
      <h2>Galeria</h2>
      <div class="grid">
        <figure>
          <img src="https://uploads.metroimg.com/wp-content/uploads/2019/10/03170310/Outubro-Rosa-O-Concorrente-_-Thiago-Melo-2.jpeg" alt="Hambúrguer 1">
          <figcaption>Clássico Rosa</figcaption>
        </figure>
        <figure>
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcoq0ygIFd_OR-1GYsDPmKQ4kPstmLmfFYnw&s" alt="Hambúrguer 2">
          <figcaption>Cheesy Pink</figcaption>
        </figure>
        <figure>
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0cl1ffvVUSFigLKKeIKY_RgDCIqqXevMn1Q&s" alt="Hambúrguer 3">
          <figcaption>Veggie Delight</figcaption>
        </figure>
      </div>
    </section>

    <section class="about">
      <h2>Sobre</h2>
      <p>Hamburgueria com foco em sabor e estética fofa para fotos incríveis.</p>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Hamburgueria Rosa — Feito com ❤</p>
  </footer>

  <script>(function(){
  document.getElementById('year').textContent = new Date().getFullYear();

  const themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    document.body.animate([{opacity:0.9},{opacity:1}], {duration:250});
  });
})();
</script>
</body>
</html>
