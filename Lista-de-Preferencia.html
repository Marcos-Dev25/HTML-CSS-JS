<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Preferência - Clean</title>
    <style>
        body {
            background-color: #f0f2f5;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #212529;
        }

        .primeiro {
            font-size: 46px;
            margin-top: 40px;
            margin-bottom: 10px;
            color: #1a73e8;
            font-weight: bold;
        }

        .cabeçario_mae {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
            flex: 1;
        }

        .cabeçario, .cabeçarioo {
            background-color: #ffffff;
            border-radius: 40px;
            width: 380px; /* Aumentei um pouco para caber o checkbox lateral */
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            border: 1px solid #e1e4e8;
        }

        h3 {
            color: #1a73e8;
            margin-bottom: 20px;
            font-size: 28px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 5px;
            width: 80%;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        /* Organiza o item e o checkbox na mesma linha */
        .item-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 15px;
            transition: 0.2s;
        }

        .item-container:hover {
            background-color: #f8f9fa;
        }

        .item-text {
            font-size: 24px;
            color: #2c2828;
            cursor: pointer;
        }

        /* Estilização do Checkbox */
        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #1a73e8; /* Muda a cor do "check" */
        }

        /* Efeito de riscar o texto quando marcado */
        input[type="checkbox"]:checked + .item-text {
            text-decoration: line-through;
            color: #adb5bd;
        }

    </style>
</head>

                </li>

                </li>

                </li>
                <li class="item-container">
                    <input type="checkbox" id="l1-i5">
                    <label for="l1-i5" class="item-text">Item 5</label>
                </li>
            </ul>
        </div>
